{% extends 'mailing/base.html' %}

{% load mediapath %}

{% block content %}
    <div class="col">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    Уверены, что хотите удалить статью? "{{ object }}"<br>
                    <input type="submit" class="btn btn-outline-danger" value="Уверен" >
                </form>
                <div class="card-footer">
                    <a href="{% url 'blog:post_list' %}" class="btn btn-primary">Блог</a>
                </div>
            </div>
        </div>
    </div>

{% endblock %}
