{% extends 'mailing/base.html' %}

{% load mediapath %}

{% block content %}
    <div class="col">
        <div class="card">
            <div class="card-body">
                <form method="post"  enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <input type="submit" class="btn btn-success" value="{% if object %}Сохранить статью{% else %}Создать статью{% endif %}" >
                </form>
                <div class="card-footer">
                    <a href="{% url 'blog:post_list' %}" class="btn btn-primary">Блог</a>
                </div>
            </div>
        </div>
    </div>

{% endblock %}
